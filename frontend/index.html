<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSH Terminal</title>
    <style>
      @font-face {
        font-family: 'JetBrainsMonoNF';
        src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@v3.3.0/patched-fonts/JetBrainsMono/Ligatures/Regular/JetBrainsMonoNerdFont-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'JetBrainsMonoNF';
        src: url('https://cdn.jsdelivr.net/gh/ryanoasis/nerd-fonts@v3.3.0/patched-fonts/JetBrainsMono/Ligatures/Bold/JetBrainsMonoNerdFont-Bold.ttf') format('truetype');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #0d1117;
        color: #e6edf3;
        font-family: system-ui, sans-serif;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #form-view {
        width: 100%;
        max-width: 420px;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }

      #form-view h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #e6edf3;
      }

      #form-view h1 span { color: #58a6ff; }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .field label {
        font-size: 0.75rem;
        font-weight: 500;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .field input,
      .field textarea,
      .field select {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        font-size: 0.875rem;
        font-family: inherit;
        padding: 0.5rem 0.625rem;
        outline: none;
        transition: border-color 0.15s;
        width: 100%;
      }

      .field input:focus,
      .field textarea:focus,
      .field select:focus {
        border-color: #58a6ff;
      }

      .field textarea {
        resize: vertical;
        min-height: 90px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 0.8rem;
      }

      .field select option { background: #161b22; }

      #auth-password { display: flex; flex-direction: column; gap: 0.35rem; }
      #auth-key      { display: flex; flex-direction: column; gap: 0.35rem; }

      #error-msg {
        color: #f85149;
        font-size: 0.8rem;
        display: none;
      }

      button[type="submit"] {
        background: #238636;
        border: 1px solid #2ea043;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        font-size: 0.875rem;
        font-weight: 500;
        padding: 0.6rem 1rem;
        transition: background 0.15s;
        width: 100%;
      }

      button[type="submit"]:hover  { background: #2ea043; }
      button[type="submit"]:active { background: #1a7f37; }
      button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

      #terminal-view {
        display: none;
        flex-direction: column;
        width: 100%;
        height: 100dvh;
      }

      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.4rem 0.75rem;
        background: #161b22;
        border-bottom: 1px solid #21262d;
        font-size: 0.8rem;
        color: #8b949e;
        flex-shrink: 0;
      }

      #topbar .conn-info { font-family: 'SF Mono', 'Fira Code', monospace; }

      #topbar button {
        background: none;
        border: 1px solid #30363d;
        border-radius: 5px;
        color: #8b949e;
        cursor: pointer;
        font-size: 0.75rem;
        padding: 0.2rem 0.6rem;
        transition: color 0.15s, border-color 0.15s;
      }

      #topbar button:hover { color: #e6edf3; border-color: #8b949e; }

      #terminal-el { flex: 1; overflow: hidden; --term-font-family: 'JetBrainsMonoNF', 'JetBrains Mono', monospace; }
    </style>
  </head>
  <body>
    <div id="form-view">
      <h1><span>ssh</span> terminal</h1>

      <form id="connect-form" autocomplete="off">
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div class="row">
            <div class="field" style="grid-column:1/3;">
              <label for="host">Host</label>
              <input id="host" type="text" placeholder="example.com" required />
            </div>
          </div>

          <div class="row">
            <div class="field">
              <label for="port">Port</label>
              <input id="port" type="number" value="22" min="1" max="65535" required />
            </div>
            <div class="field">
              <label for="username">Username</label>
              <input id="username" type="text" placeholder="root" required />
            </div>
          </div>

          <div class="field">
            <label for="auth-method">Auth</label>
            <select id="auth-method">
              <option value="privateKey">Private Key</option>
              <option value="password">Password</option>
            </select>
          </div>

          <div class="field" id="auth-key">
            <label for="private-key">Private Key (PEM)</label>
            <textarea id="private-key" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;...&#10;-----END OPENSSH PRIVATE KEY-----"></textarea>
          </div>

          <div class="field" id="auth-password" style="display:none;">
            <label for="password">Password</label>
            <input id="password" type="password" />
          </div>

          <div id="error-msg"></div>

          <button type="submit" id="connect-btn">Connect</button>
        </div>
      </form>
    </div>

    <div id="terminal-view">
      <div id="topbar">
        <span class="conn-info" id="conn-label"></span>
        <button id="disconnect-btn">Disconnect</button>
      </div>
      <div id="terminal-el"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
